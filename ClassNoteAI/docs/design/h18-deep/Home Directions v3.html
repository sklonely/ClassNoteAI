<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>ClassNote · 首頁 v3 · 混合方向</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>html,body{margin:0;padding:0;background:#eeeae2;overflow:hidden;font-family:'Inter','Noto Sans TC',system-ui,sans-serif;}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="home-v3-data.jsx"></script>
<script type="text/babel" src="home-v4-shared.jsx"></script>
<script type="text/babel" src="home-v4-abc.jsx"></script>
<script type="text/babel" src="home-v4-def.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const W = 1280, H = 820;
const Frame = ({ children, bg = '#fff' }) => (
  <div style={{ width: W, height: H, background: bg, position: 'relative', overflow: 'hidden' }}>
    <div style={{ height: 26, background: '#f3f1ec', borderBottom: '1px solid rgba(0,0,0,0.06)',
      display: 'flex', alignItems: 'center', padding: '0 12px', gap: 6, fontFamily: 'Inter',
      fontSize: 11, color: '#999' }}>
      <span style={{ width: 10, height: 10, borderRadius: 5, background: '#ff5f57' }}/>
      <span style={{ width: 10, height: 10, borderRadius: 5, background: '#febc2e' }}/>
      <span style={{ width: 10, height: 10, borderRadius: 5, background: '#28c840' }}/>
      <span style={{ marginLeft: 16 }}>classnote.app</span>
    </div>
    <div style={{ width: '100%', height: H - 26, position: 'relative' }}>{children}</div>
  </div>
);
const App = () => (
  <DesignCanvas initialZoom={0.55}>
    <DCSection id="v3" title="首頁 v3 · 行事曆 + 課程卡 + 預覽（混合）">
      <DCArtboard id="h13" label="H13 · 週曆在上 + 課程卡 + 提醒欄" width={W} height={H}>
        <Frame><HomeCalCards/></Frame>
      </DCArtboard>
      <DCArtboard id="h14" label="H14 · Hub 三欄 · 今日時間軸 + 詳情卡 + 課程列" width={W} height={H}>
        <Frame><HomeHub/></Frame>
      </DCArtboard>
      <DCArtboard id="h15" label="H15 · 課程卡為王 · 點選聚焦 · 下方 lecture 時間軸 + 詳情" width={W} height={H}>
        <Frame><HomeCardFocus/></Frame>
      </DCArtboard>
      <DCArtboard id="h16" label="H16 · 行事曆永駐側邊 + 課程卡 + 提醒" width={W} height={H}>
        <Frame><HomeCalSide/></Frame>
      </DCArtboard>
      <DCArtboard id="h17" label="H17 · 今日聚焦 · 左側日軸 + Hero 下一堂 + 底排課卡" width={W} height={H}>
        <Frame><HomeDayFocus/></Frame>
      </DCArtboard>
      <DCArtboard id="h18" label="H18 · 課 icon + Inbox + 週曆 + 預覽 · 全整合" width={W} height={H}>
        <Frame><HomeInboxCal/></Frame>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
