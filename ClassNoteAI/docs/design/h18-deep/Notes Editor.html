const InlineMath = ({ children }) => (

    color: T.text }}>
    {renderMath(children)}
  </span>

// very light "math" renderer — enough to look the part
function renderMath(src) {
  if (typeof src !== 'string') return src;
  const nodes = [];
  let i = 0, key = 0;
  while (i < src.length) {
    const ch = src[i];
    if (ch === '\\') {
      // command like \cdot, \sqrt, \sum ...
      let j = i + 1;
      while (j < src.length && /[a-zA-Z]/.test(src[j])) j++;
      const cmd = src.slice(i + 1, j);
      const map = { cdot: '·', times: '×', div: '÷', sum: '∑', int: '∫',
        sqrt: '√', alpha: 'α', beta: 'β', theta: 'θ', lambda: 'λ',
        sigma: 'σ', pi: 'π', infty: '∞', partial: '∂', nabla: '∇',
        leq: '≤', geq: '≥', neq: '≠', approx: '≈', rightarrow: '→',
        top: '⊤', mathrm: '', text: '' };
      nodes.push(<span key={key++}>{map[cmd] ?? ''}</span>);
      i = j;
    } else if (ch === '^' || ch === '_') {
      const sup = ch === '^';
      let tok; let j = i + 1;
      if (src[j] === '{') {
        const end = src.indexOf('}', j);
        tok = src.slice(j + 1, end);
        i = end + 1;
      } else {
        tok = src[j];
        i = j + 1;
      }
      nodes.push(sup
        ? <sup key={key++} style={{ fontSize: '0.75em' }}>{renderMath(tok)}</sup>
        : <sub key={key++} style={{ fontSize: '0.75em' }}>{renderMath(tok)}</sub>);
    } else {
      nodes.push(<span key={key++}>{ch}</span>);
      i++;
    }
  }
  return nodes;
}

// ── Main ──────────────────────────────────────────────────────────
const App = () => {
  const [mode, setMode] = React.useState('doc');
  const [activePage, setActivePage] = React.useState('p3');
  const [showPad, setShowPad] = React.useState(true);
  const [sync, setSync] = React.useState('drawing');

  React.useEffect(() => {
    const cycle = ['drawing', 'syncing', 'synced', 'synced'];
    let i = 0;
    const id = setInterval(() => { setSync(cycle[i % cycle.length]); i++; }, 3200);
    return () => clearInterval(id);
  }, []);

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column',
      background: T.bg }}>
      <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }`}</style>
      <TopBar mode={mode} setMode={setMode} syncState={sync}/>
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        <Sidebar activePage={activePage} setActivePage={setActivePage}/>
        {mode === 'doc'    && <DocPane fullWidth={true}/>}
        {mode === 'canvas' && <CanvasPane fullWidth={true}/>}
        {mode === 'split'  && (
          <>
            <DocPane fullWidth={false}/>
            <div style={{ width: 1, background: T.border }}/>
            <CanvasPane fullWidth={false}/>
          </>
        )}
      </div>
      {showPad && <IPadMirror onClose={() => setShowPad(false)}/>}
    </div>
  );
};
