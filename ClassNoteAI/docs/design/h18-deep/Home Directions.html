<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>ClassNote · 首頁方向探索</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #eeeae2; overflow: hidden;
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="home-v2-swiss.jsx"></script>
<script type="text/babel" src="home-v2-editor-tufte.jsx"></script>
<script type="text/babel" src="home-v2-rest.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// Laptop viewport for each artboard — reads like a real app window
const W = 1180, H = 760;

const Frame = ({ children, bg = '#fff' }) => (
  <div style={{ width: W, height: H, background: bg, position: 'relative',
    overflow: 'hidden', boxShadow: '0 1px 0 rgba(0,0,0,0.04)' }}>
    {/* faux laptop chrome */}
    <div style={{ height: 26, background: '#f3f1ec',
      borderBottom: '1px solid rgba(0,0,0,0.06)', display: 'flex',
      alignItems: 'center', padding: '0 12px', gap: 6, fontFamily: 'Inter',
      fontSize: 11, color: '#999' }}>
      <span style={{ width: 10, height: 10, borderRadius: 5, background: '#ff5f57' }}/>
      <span style={{ width: 10, height: 10, borderRadius: 5, background: '#febc2e' }}/>
      <span style={{ width: 10, height: 10, borderRadius: 5, background: '#28c840' }}/>
      <span style={{ marginLeft: 16 }}>classnote.app</span>
    </div>
    <div style={{ width: '100%', height: H - 26, position: 'relative' }}>
      {children}
    </div>
  </div>
);

const App = () => (
  <DesignCanvas initialZoom={0.55}>
    <DCSection id="home" title="ClassNote · 首頁 6 方向">

      <DCArtboard id="h1" label="H1 · Swiss / 雜誌排版" width={W} height={H}>
        <Frame bg="#f5f2ea"><HomeSwiss/></Frame>
      </DCArtboard>

      <DCArtboard id="h2" label="H2 · Minimal Editor (Linear / Things)" width={W} height={H}>
        <Frame bg="#fafafa"><HomeEditor/></Frame>
      </DCArtboard>

      <DCArtboard id="h3" label="H3 · Tufte / 學術古典" width={W} height={H}>
        <Frame bg="#fffff8"><HomeTufte/></Frame>
      </DCArtboard>

      <DCArtboard id="h4" label="H4 · Terminal / CLI" width={W} height={H}>
        <Frame bg="#0d1117"><HomeTerminal/></Frame>
      </DCArtboard>

      <DCArtboard id="h5" label="H5 · Brutalist" width={W} height={H}>
        <Frame bg="#f5f3ec"><HomeBrutalist/></Frame>
      </DCArtboard>

      <DCArtboard id="h6" label="H6 · iOS 17 / 毛玻璃" width={W} height={H}>
        <Frame bg="#fff"><HomeIOS/></Frame>
      </DCArtboard>

    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
