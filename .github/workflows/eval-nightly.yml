name: Nightly Eval

# Quality-regression harness. Complements pr-check.yml: pr-check catches
# structural bugs (tensor dimensions, missing DB rows, etc.), this one
# catches quality drift (WER climbing, MRR dropping, summaries getting
# worse). Runs nightly and commits the report so drift shows up in
# git blame over weeks/months, not in user complaints.
#
# Neither workflow is required for merging; the nightly report is
# advisory and a human should glance at it when making a release
# decision.

on:
  schedule:
    # 03:00 UTC = 11:00 AM Taipei, 8:00 PM Pacific — roughly after the
    # team's active hours in both timezones, so yesterday's PRs are
    # merged before we grade them.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write # to commit the generated report back to the repo

defaults:
  run:
    working-directory: ClassNoteAI

jobs:
  eval:
    name: run-eval-suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ClassNoteAI/package-lock.json

      - name: Install npm deps
        run: npm ci --prefer-offline

      - name: ASR WER evaluation
        run: npm run eval:asr
        continue-on-error: true

      - name: RAG MRR evaluation
        run: npm run eval:rag
        continue-on-error: true

      - name: Aggregate report
        run: npm run eval:report
        continue-on-error: true

      - name: Commit updated reports
        run: |
          if [ -n "$(git status --porcelain evals/reports)" ]; then
            git config user.name "classnote-ai-bot"
            git config user.email "noreply@anthropic.com"
            git add evals/reports/
            git commit -m "chore(eval): nightly quality report $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No eval changes to commit."
          fi
