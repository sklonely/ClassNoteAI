name: Merge Update Manifest

# Fires after either release workflow completes on a tag. Waits for the peer
# release workflow to also finish successfully, then downloads both per-platform
# manifest fragments from the release and merges them into a single
# `latest.json` with both `darwin-aarch64` and `windows-x86_64` entries.
#
# The Tauri updater in v0.5.1+ reads a single URL from each binary's
# compiled-in `tauri.conf.json`:
#   https://github.com/.../releases/latest/download/latest.json
#
# Without a merged manifest, Windows clients find no `windows-x86_64` entry
# (macOS-only `latest.json`) and silently report "no update." This workflow
# closes that gap server-side, so v0.5.1 Windows users can auto-update to
# v0.5.2+ without re-downloading the MSI. See issue #33.

on:
  workflow_run:
    workflows:
      - "Build and Release (macOS)"
      - "Build and Release (Windows)"
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    # Only proceed when the triggering workflow succeeded AND was triggered
    # by a tag push (head_branch is the tag name for tag-triggered runs,
    # e.g. "v0.5.2").
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag + peer workflow
        id: ctx
        env:
          THIS: ${{ github.event.workflow_run.name }}
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          case "$THIS" in
            "Build and Release (macOS)")   echo "peer=Build and Release (Windows)" >> "$GITHUB_OUTPUT" ;;
            "Build and Release (Windows)") echo "peer=Build and Release (macOS)"   >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown triggering workflow: $THIS"; exit 1 ;;
          esac

      - name: Wait for peer release workflow
        id: wait
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ctx.outputs.tag }}
          PEER: ${{ steps.ctx.outputs.peer }}
        run: |
          # Poll for the peer workflow's run on the same tag to complete.
          # Timeout after ~40 min (release bundles historically 15–20 min each,
          # but allow generous slack for cache misses + queue time).
          for i in $(seq 1 40); do
            PEER_RUN=$(gh run list \
              -R "${GITHUB_REPOSITORY}" \
              --workflow "$PEER" \
              --branch "$TAG" \
              --limit 1 \
              --json status,conclusion \
              --jq '.[0]')
            STATUS=$(echo "$PEER_RUN" | jq -r '.status // "missing"')
            CONCLUSION=$(echo "$PEER_RUN" | jq -r '.conclusion // ""')
            echo "attempt=$i peer status=$STATUS conclusion=$CONCLUSION"
            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "ok=true" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "Peer finished with non-success conclusion ($CONCLUSION) — aborting merge."
                exit 0
              fi
            fi
            sleep 60
          done
          echo "Peer did not complete within 40 minutes."

      - name: Checkout default branch
        if: steps.wait.outputs.ok == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Download manifest fragments
        if: steps.wait.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          # v0.6.1: Windows release ships TWO fragments — CPU and CUDA.
          # Both platforms key into the same merged latest.json under
          # different platform ids (windows-x86_64 vs windows-x86_64-cuda)
          # so the client updater can pick the right one based on local
          # GPU detection.
          gh release download "$TAG" \
            -R "${GITHUB_REPOSITORY}" \
            --pattern "latest-macos-aarch64.json" \
            --pattern "latest-windows-x86_64.json" \
            --pattern "latest-windows-x86_64-cuda.json" \
            --clobber
          # The CUDA fragment is optional: an older release from before
          # the Windows-CUDA matrix existed won't have one, and that's
          # fine — merge logic handles the absence below.
          ls -la latest-*.json || true

      - name: Merge into latest.json
        if: steps.wait.outputs.ok == 'true'
        run: |
          # Take version/notes/pub_date from the macOS fragment (arbitrary —
          # all fragments carry the same version for a given tag) and union
          # the `platforms` objects across however many fragments exist.
          # The CUDA fragment may be absent for old releases; fall back to
          # merging just what's there.
          FRAGMENTS=(latest-macos-aarch64.json latest-windows-x86_64.json)
          if [ -f latest-windows-x86_64-cuda.json ]; then
            FRAGMENTS+=(latest-windows-x86_64-cuda.json)
          fi
          # Use reduce to merge any number of fragments: first fragment
          # carries the top-level metadata, subsequent ones just add
          # their platform entries.
          jq -s 'reduce .[1:][] as $f (.[0]; .platforms += $f.platforms)' \
            "${FRAGMENTS[@]}" \
            > latest.json
          echo "--- merged latest.json ---"
          cat latest.json

      - name: Determine channel tier and write per-channel manifests
        if: steps.wait.outputs.ok == 'true'
        shell: bash
        env:
          TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          channels=()
          if [[ "$TAG" == *-alpha* ]]; then
            channels=(alpha)
          elif [[ "$TAG" == *-beta* ]]; then
            channels=(alpha beta)
          else
            channels=(alpha beta stable)
          fi

          for channel in "${channels[@]}"; do
            mkdir -p "docs/updater/$channel"
            cp latest.json "docs/updater/$channel/latest.json"
          done

      - name: Sanity check merged manifest
        if: steps.wait.outputs.ok == 'true'
        run: |
          # Both baseline platforms must be present. Windows-cuda is
          # optional for back-compat with pre-v0.6.1 tags.
          for key in "darwin-aarch64" "windows-x86_64"; do
            if ! jq -e ".platforms[\"$key\"].url" latest.json > /dev/null; then
              echo "ERROR: merged latest.json missing platforms.$key.url"
              cat latest.json
              exit 1
            fi
          done
          if jq -e '.platforms["windows-x86_64-cuda"].url' latest.json > /dev/null; then
            echo "OK: latest.json includes Windows CUDA variant."
          else
            echo "NOTE: latest.json does not include Windows CUDA variant (expected on older tags)."
          fi
          echo "OK: latest.json has all required platforms."

      - name: Open PR for manifest update
        if: steps.wait.outputs.ok == 'true'
        id: manifest_pr
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: |
            docs/updater
          branch: updater-manifest/${{ steps.ctx.outputs.tag }}
          title: chore(updater): publish manifest for ${{ steps.ctx.outputs.tag }}
          commit-message: chore(updater): update channel manifests for ${{ steps.ctx.outputs.tag }}
          body: Automated per-channel manifest update for ${{ steps.ctx.outputs.tag }}

      - name: Auto-merge manifest PR
        if: steps.wait.outputs.ok == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ steps.manifest_pr.outputs.pull-request-url }}
          PR_BRANCH: updater-manifest/${{ steps.ctx.outputs.tag }}
        run: |
          if [ -n "$PR_URL" ]; then
            gh pr merge --admin --squash "$PR_URL" || echo "Auto-merge failed. Merge manually: $PR_URL"
          else
            echo "No manifest PR was created. Branch: $PR_BRANCH"
          fi

      - name: Upload merged manifest
        if: steps.wait.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          gh release upload "$TAG" latest.json \
            -R "${GITHUB_REPOSITORY}" \
            --clobber

      # Both release workflows upload as draft so users never see a
      # half-populated release. Now that both platforms' assets are
      # on the release AND the merged latest.json is uploaded, flip
      # the draft to published.
      - name: Publish release
        if: steps.wait.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          gh release edit "$TAG" \
            -R "${GITHUB_REPOSITORY}" \
            --draft=false
