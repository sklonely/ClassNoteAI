name: Build and Release (macOS)

on:
  # Release bundles are expensive (~15–20 min). Only on tag push or
  # manual dispatch. PR feedback lives in pr-check.yml.
  push:
    tags:
      - 'v*'
  # 每週日 UTC 00:00 自動觸發，保持 Rust + ct2rs cache 活躍
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.3)'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  # 優化 Cargo 編譯
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  LLAMA_CPP_RELEASE_TAG: b8933

defaults:
  run:
    working-directory: ClassNoteAI

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: release_version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        working-directory: .

      - name: Validate source version consistency for release tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: .
        run: |
          python3 scripts/check_version_consistency.py \
            --repo-root . \
            source \
            --expected-version "${{ steps.release_version.outputs.VERSION }}"

      # sccache — cache native C++ object files (ct2rs, whisper-rs-sys)
      # across releases. Apple Silicon already has fast clang, so the
      # win here is smaller than on Windows (~3-5 min/release after
      # the first warm-cache build). Metal shader compilation is not
      # cached by sccache (similar to CUDA on Windows).
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Enable sccache for rustc
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        shell: bash

      # ===== Node.js + npm cache =====
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ClassNoteAI/package-lock.json

      # ===== Rust toolchain =====
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # ===== Rust cache (改進版) =====
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ClassNoteAI/src-tauri -> target
          # 使用更長的 cache key 包含 Cargo.lock hash
          shared-key: "macos-rust-cache"
          # 快取所有 target 目錄
          cache-targets: true
          # 保存 ~/.cargo 目錄 (crates.io index + 已下載的 crates)
          cache-all-crates: true

      # ===== 快取 Native C++ 編譯結果 =====
      # Normalize away the root package version before hashing so alpha /
      # beta bumps don't blow the native cache when the dependency graph is
      # otherwise unchanged.
      - name: Compute native C++ cache key
        id: native-cache-key
        shell: bash
        run: |
          echo "value=$(bash scripts/native-build-cache-key.sh)" >> "$GITHUB_OUTPUT"

      - name: Cache native C++ builds
        uses: actions/cache@v4
        with:
          path: |
            ClassNoteAI/src-tauri/target/aarch64-apple-darwin/release/build/ct2rs-*
            ClassNoteAI/src-tauri/target/aarch64-apple-darwin/release/build/whisper-rs-sys-*
            ClassNoteAI/src-tauri/target/aarch64-apple-darwin/release/build/sentencepiece-sys-*
          key: native-macos-aarch64-${{ steps.native-cache-key.outputs.value }}

      # ===== Hydrate vendor/ =====
      # Cargo.toml has [patch.crates-io] pointing at src-tauri/vendor/*,
      # which is gitignored. The patches are Windows-only no-ops on macOS,
      # but the directories must exist for cargo to resolve the patch.
      - name: Hydrate vendor/ (no-op patches on macOS)
        run: bash src-tauri/scripts/bootstrap-vendor.sh

      # Phase 2 of speech-pipeline-v0.6.5 (#55) follow-up: fetch the
      # pinned libonnxruntime for Silero VAD v5. See release-windows.yml
      # for the rationale — on macOS the same mechanism just ships a
      # .dylib next to the bundled app so `ORT_DYLIB_PATH` points at
      # a known-good 1.23.0 instead of whatever else might be on path.
      - name: Fetch bundled ONNX Runtime (Silero VAD dep)
        run: bash src-tauri/scripts/fetch-onnxruntime.sh

      - name: Stage llama.cpp sidecar (Apple Silicon)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          OUT_DIR="src-tauri/resources/binaries"
          TMP_DIR="$RUNNER_TEMP/llama-cpp-macos"
          ASSET="llama-${LLAMA_CPP_RELEASE_TAG}-bin-macos-arm64.tar.gz"

          rm -rf "$TMP_DIR"
          mkdir -p "$TMP_DIR" "$OUT_DIR"
          find "$OUT_DIR" -mindepth 1 ! -name .gitkeep -exec rm -rf {} +

          gh release download "$LLAMA_CPP_RELEASE_TAG" \
            --repo ggml-org/llama.cpp \
            --pattern "$ASSET" \
            --dir "$TMP_DIR" \
            --clobber
          tar -xzf "$TMP_DIR/$ASSET" -C "$TMP_DIR"

          find "$TMP_DIR" \( -type f -o -type l \) \
            \( -name "llama-server" -o -name "*.dylib" -o -name "*.dylib.*" \) \
            -exec cp -fL {} "$OUT_DIR/" \;

          test -x "$OUT_DIR/llama-server" || chmod +x "$OUT_DIR/llama-server"
          "$OUT_DIR/llama-server" --version
          ls -la "$OUT_DIR"

      # ===== 安裝 npm 依賴 =====
      - name: Install dependencies
        run: npm ci --prefer-offline

      # Explicit frontend build for parity with release-windows.yml.
      # `tauri build` does run `beforeBuildCommand` from tauri.conf.json,
      # but making it explicit means an accidental removal of that hook
      # fails loudly here instead of silently shipping stale JS.
      - name: Build frontend
        run: npm run build

      # ===== Apple code-signing setup =====
      # We import the Developer ID Application cert into a dedicated
      # keychain, then discover the identity name and export it for
      # `tauri build` to consume. Only tag builds import the certificate;
      # manual/scheduled validation builds use the unsigned step below.
      - name: Import Apple code-signing certificate
        id: apple_cert
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: .
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"

          echo "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Put our keychain in the search list so codesign can see it.
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Discover the first Developer ID Application identity so we
          # don't need a 6th APPLE_SIGNING_IDENTITY secret.
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in imported cert."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "signing_identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "Discovered signing identity: $IDENTITY"

      # ===== Build Tauri =====
      # Tag builds are release builds: import the Developer ID cert above,
      # sign/notarize here, then upload updater artifacts.
      - name: Build Tauri (Apple Silicon / signed release)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_SIGNING_IDENTITY: ${{ steps.apple_cert.outputs.signing_identity }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # v2 streaming refactor: in-process Whisper/CT2 are gone.
        # macOS Metal backend in Cargo.toml's [target.macos] now only
        # accelerates the Candle BGE embedding model.
        run: npm run tauri build -- --target aarch64-apple-darwin

      # Manual and scheduled runs are validation/cache-warming runs, not
      # publishable releases. Do not pass empty APPLE_* variables: Tauri treats
      # APPLE_SIGNING_IDENTITY="" as an explicit codesign identity and fails
      # with "The specified item could not be found in the keychain."
      - name: Build Tauri (Apple Silicon / unsigned validation)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: npm run tauri build -- --target aarch64-apple-darwin

      # Intel x86_64 暫時禁用 - GitHub Actions macOS runner 不支持 AVX-512
      # ct2rs 需要 AVX-512 指令集，但 GitHub Actions 的 Xcode 工具鏈不支援
      # - name: Build Tauri (Intel)
      #   run: npm run tauri build -- --target x86_64-apple-darwin

      - name: Upload artifacts (PR / manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64-bundle
          path: |
            ClassNoteAI/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            ClassNoteAI/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          retention-days: 7

      - name: Get version from tag
        id: get_version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        working-directory: .

      # Per-platform manifest fragment. The unified `latest.json` is produced
      # later by `merge-update-manifest.yml` once both release workflows
      # finish, so a v0.5.1 Windows client polling `latest.json` sees BOTH
      # platforms. See #33 for why the server-side merge is required.
      - name: Generate macOS updater manifest fragment
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          cat > latest-macos-aarch64.json << EOF
          {
            "version": "${VERSION}",
            "notes": "ClassNoteAI ${VERSION} 更新",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$(cat src-tauri/target/aarch64-apple-darwin/release/bundle/macos/ClassNoteAI.app.tar.gz.sig)",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/ClassNoteAI_${VERSION}_aarch64.app.tar.gz"
              }
            }
          }
          EOF

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          mkdir -p release-assets

          # Apple Silicon
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg "release-assets/ClassNoteAI_${VERSION}_aarch64.dmg" || true
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz "release-assets/ClassNoteAI_${VERSION}_aarch64.app.tar.gz" || true

          # per-platform updater fragment
          cp latest-macos-aarch64.json release-assets/

      - name: Generate Changelog
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # --force so local/remote v<current> tag doesn't clobber-reject the fetch
          git fetch --tags --force --unshallow 2>/dev/null || git fetch --tags --force
          
          # Get current tag
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          echo "Current tag: $CURRENT_TAG"
          
          # Find the previous tag that is an ancestor of the current tag
          # This works by finding the most recent tag reachable from the commit BEFORE the current tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${CURRENT_TAG}^ 2>/dev/null || echo "")
          echo "Previous tag: $PREV_TAG"
          
          # Define temporary file
          LOG_FILE="full_log.txt"
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found. Generating log from root."
            git log --pretty=format:"%s (%h)" > $LOG_FILE
          else
            echo "Generating log from $PREV_TAG to $CURRENT_TAG"
            git log --pretty=format:"%s (%h)" $PREV_TAG..$CURRENT_TAG > $LOG_FILE
          fi
          
          echo "=== Commits found ==="
          cat $LOG_FILE
          echo "====================="

          echo "## What's Changed" > release_body.txt
          echo "" >> release_body.txt

          echo "### ⚠️ 破壞性更新 (Breaking Changes)" >> release_body.txt
          grep -iE "(break|breaking|!:)" $LOG_FILE | sed -E 's/^/- /' >> release_body.txt || true
          echo "" >> release_body.txt

          echo "### ✨ 新增 (New)" >> release_body.txt
          grep -iE "^(feat|add|new)(\(.+\))?:" $LOG_FILE | grep -vE "(break|breaking|!:)" | sed -E 's/^(feat|add|new)(\([^)]+\))?: /- /' >> release_body.txt || true
          echo "" >> release_body.txt

          echo "### 🐛 修正 (Fix)" >> release_body.txt
          grep -iE "^(fix|bug)(\(.+\))?:" $LOG_FILE | grep -vE "(break|breaking|!:)" | sed -E 's/^(fix|bug)(\([^)]+\))?: /- /' >> release_body.txt || true
          echo "" >> release_body.txt

          echo "### 🔨 修改 (Modify)" >> release_body.txt
          grep -iE "^(mod|modify|refactor|update|change|chore|style|build|ci)(\(.+\))?:" $LOG_FILE | grep -vE "(break|breaking|!:)" | sed -E 's/^(mod|modify|refactor|update|change|chore|style|build|ci)(\([^)]+\))?: /- /' >> release_body.txt || true
          echo "" >> release_body.txt

          echo "### 🗑️ 刪除 (Delete)" >> release_body.txt
          grep -iE "^(del|delete|remove)(\(.+\))?:" $LOG_FILE | grep -vE "(break|breaking|!:)" | sed -E 's/^(del|delete|remove)(\([^)]+\))?: /- /' >> release_body.txt || true
          echo "" >> release_body.txt

          echo "### 📦 其他 (Other)" >> release_body.txt
          grep -ivE "^(feat|add|new|fix|bug|mod|modify|refactor|update|change|chore|style|build|ci|del|delete|remove|break|breaking)(\(.+\))?:" $LOG_FILE | grep -vE "!:" | sed 's/^/- /' >> release_body.txt || true
          
          # Append installation instructions
          echo "" >> release_body.txt
          echo "---" >> release_body.txt
          echo "### 自動更新" >> release_body.txt
          echo "已安裝用戶可透過應用內「設定 → 關於與更新」檢查更新。" >> release_body.txt

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          # Upload as draft. The release is flipped to published by
          # merge-update-manifest.yml once both platforms' builds have
          # succeeded and the unified latest.json is uploaded. This way,
          # users never see a half-populated release.
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            ClassNoteAI/release-assets/*
          body_path: ClassNoteAI/release_body.txt
